services:
  backend:
    image: ghcr.io/iissa-bazz/ticketapi-backend:latest
    container_name: ticket-backend
    volumes:
      - ticket-data:/data  # Persistent storage
    networks:
      - ticket-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/iissa-bazz/ticketapi-frontend:latest
    container_name: ticket-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ticket-network

networks:
  ticket-network:
    driver: bridge

volumes:
  ticket-data:
    driver: local